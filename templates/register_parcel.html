{% extends "base.html" %}

{% block title %}Register Parcel - {{ company.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Register New Parcel</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('register_parcel') }}">
                        <!-- Sender Information -->
                        <h5 class="mb-3"><i class="bi bi-person"></i> Sender Information</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="sender_name" class="form-label">Name *</label>
                                <input type="text" class="form-control" id="sender_name" name="sender_name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="sender_phone" class="form-label">Phone *</label>
                                <input type="tel" class="form-control" id="sender_phone" name="sender_phone" required>
                            </div>
                            <div class="col-12">
                                <label for="sender_address" class="form-label">Address *</label>
                                <textarea class="form-control" id="sender_address" name="sender_address" rows="2" required></textarea>
                            </div>
                        </div>

                        <!-- Recipient Information -->
                        <h5 class="mb-3"><i class="bi bi-geo-alt"></i> Recipient Information</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="recipient_name" class="form-label">Name *</label>
                                <input type="text" class="form-control" id="recipient_name" name="recipient_name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="recipient_phone" class="form-label">Phone *</label>
                                <input type="tel" class="form-control" id="recipient_phone" name="recipient_phone" required>
                            </div>
                            <div class="col-12">
                                <label for="recipient_address" class="form-label">Address *</label>
                                <textarea class="form-control" id="recipient_address" name="recipient_address" rows="2" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="destination_postcode" class="form-label">Postcode *</label>
                                <input type="text" class="form-control" id="destination_postcode" name="destination_postcode" pattern="[0-9]{4}" required>
                                <small class="text-muted">4-digit Australian postcode</small>
                            </div>
                        </div>

                        <!-- Parcel Details -->
                        <h5 class="mb-3"><i class="bi bi-box-seam"></i> Parcel Details</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="service_type" class="form-label">Service Type *</label>
                                <select class="form-select" id="service_type" name="service_type" required>
                                    <option value="">Select service...</option>
                                    <option value="standard">Standard</option>
                                    <option value="express">Express</option>
                                    <option value="overnight">Overnight</option>
                                    <option value="registered">Registered</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="weight" class="form-label">Weight (kg) *</label>
                                <input type="number" step="0.1" class="form-control" id="weight" name="weight" required>
                            </div>
                            <div class="col-md-3">
                                <label for="declared_value" class="form-label">Value ($)</label>
                                <input type="number" step="0.01" class="form-control" id="declared_value" name="declared_value" value="0">
                            </div>
                            <div class="col-md-6">
                                <label for="dimensions" class="form-label">Dimensions</label>
                                <input type="text" class="form-control" id="dimensions" name="dimensions" placeholder="e.g., 30x20x10cm">
                            </div>
                            <div class="col-12">
                                <label for="special_instructions" class="form-label">Special Instructions</label>
                                <textarea class="form-control" id="special_instructions" name="special_instructions" rows="2"></textarea>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Register Parcel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Check if there's scanned data from camera scanner
document.addEventListener('DOMContentLoaded', function() {
    const scannedData = sessionStorage.getItem('scannedData');
    
    if (scannedData) {
        try {
            const data = JSON.parse(scannedData);
            
            // Show notification that data is being pre-filled
            const alert = document.createElement('div');
            alert.className = 'alert alert-success alert-dismissible fade show';
            alert.innerHTML = `
                <i class="bi bi-check-circle"></i> 
                <strong>Data from camera scanner loaded!</strong> Please verify and complete the remaining fields.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.card-body').insertBefore(alert, document.querySelector('form'));
            
            // Pre-fill recipient name if detected
            if (data.recipient_name) {
                document.getElementById('recipient_name').value = data.recipient_name;
            }
            
            // Pre-fill recipient address if detected
            if (data.address) {
                document.getElementById('recipient_address').value = data.address;
            }
            
            // Pre-fill postcode - prioritize the dedicated postcode field from bottom-right detection
            if (data.postcode) {
                document.getElementById('destination_postcode').value = data.postcode;
                console.log('Postcode pre-filled from scanner:', data.postcode);
            } else if (data.address) {
                // Fallback: try to extract postcode from address (Australian 4-digit postcodes)
                const postcodeMatch = data.address.match(/\b(\d{4})\b/);
                if (postcodeMatch) {
                    document.getElementById('destination_postcode').value = postcodeMatch[1];
                    console.log('Postcode extracted from address:', postcodeMatch[1]);
                }
            }
            
            // If barcode was detected, you might use it for special handling
            if (data.barcode) {
                // Could be used to auto-fill special instructions or reference number
                const specialInstructions = document.getElementById('special_instructions');
                if (specialInstructions.value === '') {
                    specialInstructions.value = `Scanned Barcode: ${data.barcode}`;
                }
            }
            
            // Parse additional fields from detected text if available
            if (data.full_text) {
                // Try to extract phone numbers (Australian format)
                const phoneMatch = data.full_text.match(/(?:\+61|0)\s?[2-478]\s?\d{4}\s?\d{4}/);
                if (phoneMatch && !document.getElementById('recipient_phone').value) {
                    document.getElementById('recipient_phone').value = phoneMatch[0].replace(/\s/g, '');
                }
            }
            
            // Clear the session storage after using the data
            sessionStorage.removeItem('scannedData');
            
        } catch (error) {
            console.error('Error loading scanned data:', error);
        }
    }
});
</script>
{% endblock %}

# Pre-commit hooks for Zava
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code with Black
        args: ['--line-length=120']
        language_version: python3.11

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code with Flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        additional_dependencies: [flake8-docstrings]

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports
        args: ['--profile', 'black', '--line-length', '120']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Security checks
      - id: detect-private-key
        name: Detect private keys
        description: Prevents committing private SSH keys

      - id: detect-aws-credentials
        name: Detect AWS credentials
        args: ['--allow-missing-credentials']

      # File formatting
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: ['--markdown-linebreak-ext=md']

      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensures files end with a newline

      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']

      # Syntax checks
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^\.github/workflows/  # Some GitHub Actions syntax not supported

      - id: check-json
        name: Check JSON syntax

      - id: check-toml
        name: Check TOML syntax

      - id: check-xml
        name: Check XML syntax

      # Python checks
      - id: check-ast
        name: Check Python AST
        description: Validates Python syntax

      - id: check-builtin-literals
        name: Check for mutable default arguments
        description: Prevents common Python mistakes

      - id: check-docstring-first
        name: Check docstring is first

      - id: debug-statements
        name: Check for debugger imports
        description: Prevents committing pdb, ipdb statements

      - id: name-tests-test
        name: Check test file naming
        args: ['--pytest-test-first']

      # Merge conflict markers
      - id: check-merge-conflict
        name: Check for merge conflicts

      # Large files
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']  # Prevent files > 1MB
        exclude: '^static/images/|^tests/fixtures/'

      # Case conflicts
      - id: check-case-conflict
        name: Check for case conflicts
        description: Prevents case-insensitive filename conflicts

  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # Azure-specific checks
  - repo: local
    hooks:
      - id: check-env-file
        name: Verify .env not committed
        entry: python -c "import sys; import os; sys.exit(1) if os.path.exists('.env') else sys.exit(0)"
        language: system
        pass_filenames: false

      - id: check-azure-secrets
        name: Check for Azure secrets
        entry: python -c "import sys; import subprocess; result = subprocess.run(['grep', '-r', 'AccountKey=', '--include=*.py', '--exclude-dir=.git', '.'], capture_output=True); sys.exit(1 if result.returncode == 0 else 0)"
        language: system
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args: ['--fix', '--config', '.markdownlint.json']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: ['-d', '{extends: default, rules: {line-length: {max: 120}, document-start: disable}}']

  # Python type checking (optional - may be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       name: Type check with mypy
  #       args: ['--ignore-missing-imports', '--check-untyped-defs']
  #       additional_dependencies: [types-all]

# Configuration
default_language_version:
  python: python3.11

# Files to exclude from all hooks
exclude: |
  (?x)^(
      __pycache__/.*|
      .*\.pyc$|
      \.git/.*|
      \.venv/.*|
      venv/.*|
      node_modules/.*|
      \.azure-deployment\.json$|
      static/reports/.*
  )$

# Fail fast: stop running hooks after first failure
fail_fast: false

# Minimum version of pre-commit required
minimum_pre_commit_version: 2.20.0
